<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semente Sagrada World</title>
    <script>
      // Fix for protobufjs/fetch error in AI Studio iframe environment
      (function() {
        const originalFetch = window.fetch;
        if (originalFetch) {
          try {
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() { return originalFetch; },
              set: function(v) { 
                console.warn('Attempted to overwrite window.fetch was prevented to avoid crash.');
              }
            });
          } catch (e) {
            // If we can't redefine it, we just hope for the best or it's already protected
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
